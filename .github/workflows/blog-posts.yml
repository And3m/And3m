name: Latest Blog Posts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # Replace with your actual blog RSS feed URL
          # Examples:
          #   Medium:  https://medium.com/feed/@your-username
          #   Dev.to:  https://dev.to/feed/your-username
          #   Hashnode: https://your-blog.hashnode.dev/rss.xml
          feed_list: "https://medium.com/feed/@vijayandem"
          max_post_count: 5
          commit_message: "chore: update blog posts in README"
          committer_username: "github-actions[bot]"
          committer_email: "github-actions[bot]@users.noreply.github.com"
