<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="100%">
  <style>
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.6; }
    }
    @keyframes float1 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes float3 {
      0%, 100% { transform: translateY(-4px); }
      50% { transform: translateY(4px); }
    }
    @keyframes float4 {
      0%, 100% { transform: translateY(2px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 400; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.15; }
    }
    .title {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 52px;
      font-weight: 700;
      fill: #e6edf3;
      animation: fadeInDown 1.5s ease-out both;
    }
    .subtitle {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 17px;
      font-weight: 400;
      fill: #8b949e;
      animation: fadeInUp 1.5s ease-out both;
    }
    .accent-line {
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: drawLine 2s ease-out 0.8s forwards;
    }
    .dot1 { animation: pulse 3s ease-in-out infinite; }
    .dot2 { animation: pulse 3s ease-in-out 0.7s infinite; }
    .dot3 { animation: pulse 3s ease-in-out 1.4s infinite; }
    .dot4 { animation: pulse 3s ease-in-out 2.1s infinite; }
    .dot5 { animation: pulse 3s ease-in-out 0.3s infinite; }
    .dot6 { animation: pulse 3s ease-in-out 1.8s infinite; }
    .sym1 {
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      fill: #58a6ff;
      opacity: 0.2;
      animation: float1 4s ease-in-out infinite;
    }
    .sym2 {
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      fill: #58a6ff;
      opacity: 0.15;
      animation: float2 5s ease-in-out infinite;
    }
    .sym3 {
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      fill: #58a6ff;
      opacity: 0.18;
      animation: float3 4.5s ease-in-out infinite;
    }
    .sym4 {
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      fill: #58a6ff;
      opacity: 0.15;
      animation: float4 5.5s ease-in-out infinite;
    }
    .glow {
      animation: glowPulse 4s ease-in-out infinite;
    }
  </style>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="40%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0" />
      <stop offset="50%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bgGrad)" />

  <!-- Subtle glow behind text -->
  <ellipse cx="600" cy="100" rx="350" ry="80" fill="url(#glowGrad)" class="glow" />

  <!-- Decorative dots -->
  <circle cx="80" cy="35" r="2" fill="#58a6ff" class="dot1" />
  <circle cx="200" cy="185" r="1.5" fill="#1f6feb" class="dot2" />
  <circle cx="1000" cy="45" r="2.5" fill="#58a6ff" class="dot3" />
  <circle cx="1120" cy="175" r="2" fill="#1f6feb" class="dot4" />
  <circle cx="400" cy="22" r="1.5" fill="#58a6ff" class="dot5" />
  <circle cx="820" cy="195" r="2" fill="#1f6feb" class="dot6" />

  <!-- Floating code symbols -->
  <text x="55" y="90" class="sym1" font-size="20">&lt;/&gt;</text>
  <text x="1095" y="75" class="sym2" font-size="18">{ }</text>
  <text x="130" y="175" class="sym3" font-size="16">[ ]</text>
  <text x="1025" y="180" class="sym4" font-size="16">( )</text>

  <!-- Main title -->
  <text x="600" y="92" text-anchor="middle" class="title">Vijay Andem</text>

  <!-- Accent line -->
  <line x1="400" y1="118" x2="800" y2="118" stroke="url(#lineGrad)" stroke-width="2" class="accent-line" fill="none" />

  <!-- Subtitle -->
  <text x="600" y="152" text-anchor="middle" class="subtitle">Data Analyst  ·  Gen AI Architect  ·  BI Professional</text>
</svg>
